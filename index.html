<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Space // WWDC Liquid Glass</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.12);
            --specular: rgba(255, 255, 255, 0.2);
            --text-apple: #f5f5f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #08090c; /* Fondo oscuro premium */
            color: var(--text-apple);
        }

        /* 🎚️ MALLA DE FONDO OSCURA WWDC */
        .tech-grid {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100px 100px;
            pointer-events: none;
        }

        /* DOCK SUPERIOR FLOTANTE */
        .dock-wrapper {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dock {
            background: rgba(10, 12, 18, 0.45);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid var(--border-glass);
            padding: 6px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 var(--specular);
        }

        .dock-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.55);
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .dock-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .dock-btn.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .dock-divider {
            width: 1px;
            height: 18px;
            background: var(--border-glass);
            margin: 0 4px;
        }

        /* REJILLA PRINCIPAL DE CHATS */
        .workspace {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 110px 24px 24px 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .workspace.focused-view {
            grid-template-columns: 1fr !important;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .chat-box.hidden {
            display: none !important;
        }

        /* 🏷️ CÁPSULA FLOTANTE LIQUID GLASS REAL */
        .liquid-tag {
            align-self: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px) saturate(140%);
            -webkit-backdrop-filter: blur(25px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.4px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            z-index: 10;
        }

        /* CUERPO DEL CHAT DE CRISTAL OSCURO */
        .glass-body {
            width: 100%;
            flex-grow: 1;
            background: var(--bg-glass);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), inset 0 1.5px 0 rgba(255, 255, 255, 0.1);
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* BOTÓN REDONDO DE SALIDA */
        .exit-fs-btn {
            position: fixed;
            top: 22px;
            right: 30px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .exit-fs-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: scale(1.05);
        }

        body.fullscreen-active .dock-wrapper {
            transform: translate(-50%, -100px);
            opacity: 0;
            pointer-events: none;
        }

        body.fullscreen-active .workspace {
            padding: 75px 20px 20px 20px !important;
            gap: 15px !important;
        }

        body.fullscreen-active .glass-body {
            border-radius: 20px;
            background: rgba(12, 15, 23, 0.75);
        }

        body.fullscreen-active .exit-fs-btn {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <button class="exit-fs-btn" id="exitFsBtn" onclick="leaveFullscreen()">
        <i data-lucide="x" style="width: 18px; height: 18px;"></i>
    </button>

    <div class="tech-grid"></div>

    <div class="dock-wrapper">
        <div class="dock">
            <button class="dock-btn active" onclick="changeCategory('all', this)">
                <i data-lucide="layout-grid" style="width:13px;height:13px;"></i> Todos
            </button>
            <div class="dock-divider"></div>
            
            <button class="dock-btn" onclick="changeCategory('foxtergg', this)">FoxTerGG</button>
            <button class="dock-btn" onclick="changeCategory('lopezfnx', this)">lopezfnx</button>
            <button class="dock-btn" onclick="changeCategory('elcalvolol', this)">elcalvolol</button>
            <button class="dock-btn" onclick="changeCategory('franbeuve', this)">franbeuve</button>
            
            <div class="dock-divider"></div>
            <button class="dock-btn" onclick="enterFullscreen()" style="background: rgba(255,255,255,0.08); color: #fff;">
                <i data-lucide="maximize-2" style="width:13px;height:13px;"></i> Fullscreen
            </button>
        </div>
    </div>

    <main class="workspace" id="workspace">
        <div class="chat-box" data-streamer="foxtergg">
            <div class="liquid-tag">FoxTerGG</div>
            <div class="glass-body"><div class="iframe-container" id="container-foxtergg"></div></div>
        </div>

        <div class="chat-box" data-streamer="lopezfnx">
            <div class="liquid-tag">lopezfnx</div>
            <div class="glass-body"><div class="iframe-container" id="container-lopezfnx"></div></div>
        </div>

        <div class="chat-box" data-streamer="elcalvolol">
            <div class="liquid-tag">elcalvolol</div>
            <div class="glass-body"><div class="iframe-container" id="container-elcalvolol"></div></div>
        </div>

        <div class="chat-box" data-streamer="franbeuve">
            <div class="liquid-tag">franbeuve</div>
            <div class="glass-body"><div class="iframe-container" id="container-franbeuve"></div></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const targets = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        // Este código lee automáticamente tu dirección de GitHub de forma segura
        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;

            targets.forEach(channel => {
                const container = document.getElementById(`container-${channel}`);
                if (container) {
                    container.innerHTML = `
                        <iframe 
                            src="https://www.twitch.tv/embed/${channel}/chat?parent=${currentDomain}&darkpopout"
                            height="100%"
                            width="100%">
                        </iframe>
                    `;
                }
            });
        });

        function changeCategory(mode, btn) {
            const workspace = document.getElementById('workspace');
            const cards = document.querySelectorAll('.chat-box');
            const menuBtns = document.querySelectorAll('.dock-btn');
            menuBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (mode === 'all') {
                workspace.classList.remove('focused-view');
                cards.forEach(c => c.classList.remove('hidden'));
            } else {
                workspace.classList.add('focused-view');
                cards.forEach(c => {
                    if (c.getAttribute('data-streamer') === mode) {
                        c.classList.remove('hidden');
                    } else {
                        c.classList.add('hidden');
                    }
                });
            }
        }

        function enterFullscreen() {
            document.body.classList.add('fullscreen-active');
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
        }

        function leaveFullscreen() {
            document.body.classList.remove('fullscreen-active');
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') leaveFullscreen();
        });
    </script>
</body>
</html>
