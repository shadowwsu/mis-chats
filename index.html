<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA G4NG // Live Stats</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a; /* Fondo ultra oscuro Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* 📊 BARRA MAESTRA DE RESOLUCIÓN AJUSTADA PANORÁMICA */
        .stats-bar {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 16px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Bloque Izquierdo: Solo marca estática */
        .stats-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            background: #121318;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .brand-text {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* Bloque Central: Contenedor para las tarjetas de datos */
        .stats-cards-box {
            display: flex;
            gap: 12px;
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
            height: 70%;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* Tarjeta de Viewers con aura roja */
        .stat-card.live-viewers {
            border-color: rgba(255, 59, 48, 0.15);
            background: rgba(255, 59, 48, 0.02);
            box-shadow: inset 0 0 15px rgba(255, 59, 48, 0.05);
        }

        .stat-card.live-viewers .number {
            color: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .stat-card.live-viewers .number::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3b30;
        }

        .stat-card.live-viewers .label {
            color: rgba(255, 59, 48, 0.6);
        }

        /* 🚪 NUEVO BOTÓN HOME A LA DERECHA (ICONO PERSONITA) */
        .exit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%; /* Redondo a juego con el logo */
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .exit-btn:hover {
            color: #000;
            background: #ffb700; /* Se enciende en oro al pasar el cursor */
            border-color: #ffb700;
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(255, 183, 0, 0.4);
        }

        .exit-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        
        <div class="stats-brand">
            <div class="brand-logo">LG</div>
            <div class="brand-text">LA<br>G4NG</div>
        </div>

        <div class="stats-cards-box">
            <div class="stat-card">
                <span class="number">3</span>
                <span class="label">Canales Online</span>
            </div>
            
            <div class="stat-card live-viewers">
                <span class="number">1272</span>
                <span class="label">Viewers en Directo</span>
            </div>
        </div>

        <a href="index.html" class="exit-btn" title="Volver al Menú Central">
            <svg class="exit-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </a>
        
    </div>

</body>
</html>
