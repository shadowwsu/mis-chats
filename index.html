<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub // LA G4NG</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a; /* Fondo ultra oscuro Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 🌌 EFECTO DE RESPLANDOR DE FONDO */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 183, 0, 0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* 🎛️ PANELS CENTRALES */
        .hub-container {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 26px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hub-title {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffb700; /* Oro premium */
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(255, 183, 0, 0.2);
        }

        .category-wrapper {
            text-align: left;
        }

        .category-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
            padding-left: 4px;
            display: block;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Botón de enlace estilo Apple Liquid Glass */
        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 18px;
            border-radius: 14px;
            color: #f5f5f7;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Variación para los botones grupales/especiales */
        .hub-btn.featured {
            background: rgba(255, 183, 0, 0.04);
            border-color: rgba(255, 183, 0, 0.15);
        }

        /* Botón destacado para las Estadísticas / Viewers */
        .hub-btn.stats-btn {
            background: rgba(255, 59, 48, 0.04);
            border-color: rgba(255, 59, 48, 0.15);
        }

        /* Animaciones al pasar el ratón por encima */
        .hub-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .hub-btn.featured:hover {
            background: #ffb700;
            border-color: #ffb700;
            color: #000;
        }

        .hub-btn.stats-btn:hover {
            background: #ff3b30;
            border-color: #ff3b30;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        .btn-arrow {
            font-size: 14px;
            opacity: 0.4;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .hub-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(3px);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="hub-container">
        <div class="hub-title">LA G4NG HUB</div>

        <div class="category-wrapper">
            <span class="category-label">ESTADÍSTICAS</span>
            <div class="menu-grid">
                <a href="viewers.html" class="hub-btn stats-btn">
                    <span>📊 Viewers Totales (Contadores)</span>
                    <span class="btn-arrow">➔</span>
                </a>
            </div>
        </div>

        <div class="category-wrapper">
            <span class="category-label">CHATS</span>
            <nav class="menu-grid">
                <a href="todos_horizontal.html" class="hub-btn featured">
                    <span>Todos los Chats (Horizontal)</span>
                    <span class="btn-arrow">➔</span>
                </a>
                <a href="todos_vertical.html" class="hub-btn featured">
                    <span>Todos los Chats (Vertical)</span>
                    <span class="btn-arrow">➔</span>
                </a>

                <a href="foxtergg.html" class="hub-btn">
                    <span>FoxTerGG</span>
                    <span class="btn-arrow">➔</span>
                </a>
                <a href="lopezfnx.html" class="hub-btn">
                    <span>Lopezfnx</span>
                    <span class="btn-arrow">➔</span>
                </a>
                <a href="elcalvolol.html" class="hub-btn">
                    <span>Elcalvolol</span>
                    <span class="btn-arrow">➔</span>
                </a>
                <a href="franbeuve.html" class="hub-btn">
                    <span>Franbeuve</span>
                    <span class="btn-arrow">➔</span>
                </a>
            </nav>
        </div>
    </div>

</body>
</html>
