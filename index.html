<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lopezfnx // Chat Vertical</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #090a0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA EN LÍNEA CORREGIDA */
        .streamer-header {
            width: 100%;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffb700;
        }

        .nav-bar {
            display: flex;
            gap: 5px;
        }

        .nav-link {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            color: #000;
            background: #ffb700;
            border-color: #ffb700;
            box-shadow: 0 2px 8px rgba(255, 183, 0, 0.3);
        }

        /* 🗃️ MÁSCARA AJUSTADA PARA ELIMINAR EL ANUNCIO INTERNO */
        .chat-mask {
            width: 100%;
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        /* 🚀 RECORTE RECALCULADO: Subimos más el Top para esconder el banner de Crunchyroll */
        .chat-mask iframe {
            position: absolute;
            width: 106%;
            left: -3%;
            height: calc(100% + 250px);
            top: -165px; /* De -115px pasamos a -165px para ocultar el bloque intruso */
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="streamer-header">
        <div class="channel-name">Lopezfnx</div>
        <nav class="nav-bar">
            <a href="todos.html" class="nav-link">Todos</a>
            <a href="foxtergg.html" class="nav-link">Foxter</a>
            <a href="elcalvolol.html" class="nav-link">Calvo</a>
            <a href="index.html" class="nav-link active">Lopez</a>
            <a href="franbeuve.html" class="nav-link">Fran</a>
        </nav>
    </div>

    <div class="chat-mask" id="chatContainer"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <iframe 
                    src="https://www.twitch.tv/embed/lopezfnx/chat?parent=${currentDomain}&darkpopout"
                    height="100%"
                    width="100%">
                </iframe>
            `;
        });
    </script>
</body>
</html>
