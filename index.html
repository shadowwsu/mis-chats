<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #090a0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA PREMIUM ULTRA LIMPIA FUSIONADA */
        .streamer-header {
            width: 100%;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffb700; /* Oro premium para resaltar en el entorno oscuro */
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        /* 🗃️ CONTENEDOR MÁSCARA (CORTA TODO EL RELLENO DE TWITCH) */
        .chat-mask {
            width: 100%;
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        /* 🚀 EL TRUCO DEL RECORTE TOTAL: Empuja hacia afuera lo que no queremos ver */
        .chat-mask iframe {
            position: absolute;
            /* Estira el ancho para ocultar márgenes e iconos laterales molestos */
            width: 106%;
            left: -3%;
            
            /* Hacemos el alto mucho más grande y lo desplazamos estratégicamente */
            height: calc(100% + 195px);
            top: -115px; /* Sube el iframe para saltarse la barra de bits, anuncios y la X de cerrar */
            
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="streamer-header" id="channelTitle">Cargando Chat...</div>

    <div class="chat-mask" id="chatContainer">
        </div>

    <script>
        // Función principal para obtener parámetros de la URL
        function getStreamerFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('streamer'); // Busca "?streamer=nombre"
        }

        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;
            
            // Detectar qué streamer cargar. Si no hay ninguno en la URL, por defecto ponemos 'lopezfnx'
            let activeChannel = getStreamerFromURL();
            if (!activeChannel) {
                activeChannel = 'lopezfnx'; 
            }

            // 1. Actualizar el título limpio de la parte superior en mayúsculas
            document.getElementById('channelTitle').innerText = activeChannel;

            // 2. Inyectar el iframe ultra-recortado usando la versión embed optimizada
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <iframe 
                    src="https://www.twitch.tv/embed/${activeChannel}/chat?parent=${currentDomain}&darkpopout"
                    height="100%"
                    width="100%">
                </iframe>
            `;
        });
    </script>
</body>
</html>
