<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub // LA G4NG</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a; /* Fondo ultra oscuro Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow: hidden;
        }

        /* 📊 BARRA MAESTRA DEL INDEX (RESOLUCIÓN EXACTA) */
        .stats-bar {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 16px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
        }

        /* Bloque Izquierdo: Marca Estática */
        .stats-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            background: #121318;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .brand-text {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* Bloque Central: Contenedor para las tarjetas de datos */
        .stats-cards-box {
            display: flex;
            gap: 12px;
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
            height: 70%;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* Tarjeta de Viewers con aura roja */
        .stat-card.live-viewers {
            border-color: rgba(255, 59, 48, 0.15);
            background: rgba(255, 59, 48, 0.02);
            box-shadow: inset 0 0 15px rgba(255, 59, 48, 0.05);
        }

        .stat-card.live-viewers .number {
            color: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .stat-card.live-viewers .number::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3b30;
        }

        .stat-card.live-viewers .label {
            color: rgba(255, 59, 48, 0.6);
        }

        /* 👤 BOTÓN INTERACTIVO DE LA PERSONITA (ABRE EL MENÚ AL LADO) */
        .menu-trigger-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-trigger-btn:hover, .menu-trigger-btn.active {
            color: #000;
            background: #ffb700; /* Se ilumina en oro premium */
            border-color: #ffb700;
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(255, 183, 0, 0.4);
        }

        .person-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* 🗺️ PANEL LATERAL DESPLEGABLE OCULTO (AL LADO DERECHO) */
        .side-menu {
            position: fixed;
            top: 12px;
            right: -280px; /* Escondido por defecto fuera de la pantalla */
            width: 260px;
            height: calc(100% - 24px);
            background: rgba(10, 11, 16, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.7);
            z-index: 100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Estado visible cuando se activa */
        .side-menu.open {
            right: 12px;
        }

        .menu-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 8px;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Botones del menú lateral estilo Apple Glass */
        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 11px 14px;
            border-radius: 10px;
            color: #f5f5f7;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .hub-btn.featured {
            background: rgba(255, 183, 0, 0.05);
            border-color: rgba(255, 183, 0, 0.15);
            color: #ffb700;
        }

        .hub-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(-3px);
        }

        .hub-btn.featured:hover {
            background: #ffb700;
            border-color: #ffb700;
            color: #000;
        }

        .btn-arrow {
            font-size: 11px;
            opacity: 0.4;
        }
        
        .hub-btn:hover .btn-arrow {
            opacity: 1;
        }

        /* Capa oscura transparente de fondo al abrir el menú */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            transition: opacity 0.3s ease;
        }
        .menu-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="stats-bar">
        
        <div class="stats-brand">
            <div class="brand-logo">LG</div>
            <div class="brand-text">LA<br>G4NG</div>
        </div>

        <div class="stats-cards-box">
            <div class="stat-card">
                <span class="number">3</span>
                <span class="label">Canales Online</span>
            </div>
            
            <div class="stat-card live-viewers">
                <span class="number">1272</span>
                <span class="label">Viewers en Directo</span>
            </div>
        </div>

        <div class="menu-trigger-btn" id="menuBtn" title="Abrir Panel de Chats">
            <svg class="person-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        
    </div>

    <nav class="side-menu" id="sideMenu">
        <div class="menu-title">Lista de Chats</div>
        
        <div class="links-grid">
            <a href="todos_horizontal.html" class="hub-btn featured">
                <span>Todos (Horizontal)</span>
                <span class="btn-arrow">➔</span>
            </a>
            <a href="todos_vertical.html" class="hub-btn featured">
                <span>Todos (Vertical)</span>
                <span class="btn-arrow">➔</span>
            </a>
            
            <a href="foxtergg.html" class="hub-btn">
                <span>FoxTerGG</span>
                <span class="btn-arrow">➔</span>
                </a>
            <a href="lopezfnx.html" class="hub-btn">
                <span>Lopezfnx</span>
                <span class="btn-arrow">➔</span>
            </a>
            <a href="elcalvolol.html" class="hub-btn">
                <span>Elcalvolol</span>
                <span class="btn-arrow">➔</span>
            </a>
            <a href="franbeuve.html" class="hub-btn">
                <span>Franbeuve</span>
                <span class="btn-arrow">➔</span>
            </a>
        </div>
    </nav>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');

        function toggleMenu() {
            menuBtn.classList.toggle('active');
            sideMenu.classList.toggle('open');
            menuOverlay.classList.toggle('show');
        }

        menuBtn.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', toggleMenu);
    </script>

</body>
</html>
