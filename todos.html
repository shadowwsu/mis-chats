<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos los Chats // Vertical Grid</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #090a0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 🏷️ CABECERA EN LÍNEA: NOMBRE + BOTONES DE NAVEGACIÓN */
        .streamer-header {
            width: 100%;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        /* Nombre de la sección actual */
        .channel-name {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffb700; /* Oro premium */
        }

        /* Barra de navegación superior */
        .nav-bar {
            display: flex;
            gap: 5px;
        }

        /* Botones estilo pestañas Liquid Glass */
        .nav-link {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Estilo del botón activo */
        .nav-link.active {
            color: #000;
            background: #ffb700;
            border-color: #ffb700;
            box-shadow: 0 2px 8px rgba(255, 183, 0, 0.3);
        }

        /* 🗃️ CONTENEDOR MULTI-CHAT VERTICAL (Con scroll interno) */
        .workspace-scroll {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto; /* Permite hacer scroll vertical por los chats */
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
        }

        /* Mini-cabecera interna para separar visualmente cada chat */
        .chat-separator {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.3);
            padding-left: 8px;
            margin-top: 4px;
        }

        /* Caja de máscara individual para cada iframe */
        .chat-mask-box {
            width: 100%;
            height: 400px; /* Alto fijo ideal para cada bloque de chat */
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* 🚀 EL TRUCO DEL RECORTE TOTAL POR IFRAME */
        .chat-mask-box iframe {
            position: absolute;
            width: 106%;
            left: -3%;
            height: calc(100% + 195px);
            top: -115px;
            border: none;
            background: transparent;
        }

        /* Personalización fina del scrollbar para Minecraft */
        .workspace-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .workspace-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .workspace-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="streamer-header">
        <div class="channel-name">Todos los chats</div>
        
        <nav class="nav-bar">
            <a href="todos.html" class="nav-link active">Todos</a>
            <a href="foxtergg.html" class="nav-link">Foxter</a>
            <a href="elcalvolol.html" class="nav-link">Calvo</a>
            <a href="index.html" class="nav-link">Lopez</a>
            <a href="franbeuve.html" class="nav-link">Fran</a>
        </nav>
    </div>

    <main class="workspace-scroll" id="multiWorkspace">
        
        <div class="chat-separator">FoxTerGG</div>
        <div class="chat-mask-box" id="box-foxtergg"></div>

        <div class="chat-separator">lopezfnx</div>
        <div class="chat-mask-box" id="box-lopezfnx"></div>

        <div class="chat-separator">elcalvolol</div>
        <div class="chat-mask-box" id="box-elcalvolol"></div>

        <div class="chat-separator">franbeuve</div>
        <div class="chat-mask-box" id="box-franbeuve"></div>

    </main>

    <script>
        const channels = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;

            channels.forEach(channel => {
                const box = document.getElementById(`box-${channel}`);
                if (box) {
                    box.innerHTML = `
                        <iframe 
                            src="https://www.twitch.tv/embed/${channel}/chat?parent=${currentDomain}&darkpopout"
                            height="100%"
                            width="100%">
                        </iframe>
                    `;
                }
            });
        });
    </script>
</body>
</html>
