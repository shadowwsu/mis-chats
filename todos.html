<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA G4NG // Fila Horizontal</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #090a0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA PREMIUM ULTRA LIMPIA (SIN ENLACES) */
        .streamer-header {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Alinea el título a la izquierda */
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        /* Título personalizado */
        .channel-name {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffb700; /* Oro premium */
        }

        /* 🎛️ CONTENEDOR EN FILA HORIZONTAL PERFECTO */
        .row-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Columnas exactamente iguales */
            grid-template-rows: 1fr;
            gap: 12px;
            flex-grow: 1;
            padding: 12px;
            background: transparent;
        }

        /* Tarjeta de cristal para cada chat */
        .chat-card {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Nombre sutil del streamer arriba en cada bloque */
        .chat-label {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            z-index: 5;
            letter-spacing: 1px;
        }

        /* Máscara de recorte */
        .chat-mask {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* 🚀 RECORTE AJUSTADO: Eliminación completa de la barra morada invasora */
        .chat-mask iframe {
            position: absolute;
            width: 106%;
            left: -3%;
            height: calc(100% + 225px);
            top: -142px; /* Forzado exacto para limpiar el inicio del chat en horizontal */
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="streamer-header">
        <div class="channel-name">LA G4NG</div>
    </div>

    <main class="row-container">
        
        <div class="chat-card">
            <div class="chat-label">FoxTerGG</div>
            <div class="chat-mask" id="box-foxtergg"></div>
        </div>

        <div class="chat-card">
            <div class="chat-label">lopezfnx</div>
            <div class="chat-mask" id="box-lopezfnx"></div>
        </div>

        <div class="chat-card">
            <div class="chat-label">elcalvolol</div>
            <div class="chat-mask" id="box-elcalvolol"></div>
        </div>

        <div class="chat-card">
            <div class="chat-label">franbeuve</div>
            <div class="chat-mask" id="box-franbeuve"></div>
        </div>

    </main>

    <script>
        const targets = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;

            targets.forEach(channel => {
                const mask = document.getElementById(`box-${channel}`);
                if (mask) {
                    mask.innerHTML = `
                        <iframe 
                            src="https://www.twitch.tv/embed/${channel}/chat?parent=${currentDomain}&darkpopout"
                            height="100%"
                            width="100%">
                        </iframe>
                    `;
                }
            });
        });
    </script>
</body>
</html>
