<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos los Chats // Horizontal Grid</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #090a0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA PREMIUM HORIZONTAL ACCESIBLE */
        .streamer-header {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffb700;
        }

        .nav-bar {
            display: flex;
            gap: 6px;
        }

        .nav-link {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            color: #000;
            background: #ffb700;
            border-color: #ffb700;
            box-shadow: 0 2px 8px rgba(255, 183, 0, 0.3);
        }

        /* 🎚️ REJILLA DE CRISTAL 2X2 PARA PANTALLAS HORIZONTALES */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            flex-grow: 1;
            padding: 10px;
            background: transparent;
        }

        /* Caja contenedora de cada chat */
        .chat-card {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Etiqueta interna con el nombre del streamer */
        .chat-label {
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            z-index: 5;
            letter-spacing: 1px;
        }

        /* Máscara de recorte optimizada para la escala horizontal */
        .chat-mask {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Ajuste de márgenes perfecto para eliminar publicidad y la barra morada */
        .chat-mask iframe {
            position: absolute;
            width: 104%;
            left: -2%;
            height: calc(100% + 210px);
            top: -145px; /* Compensa la deformación horizontal ocultando el banner intruso */
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="streamer-header">
        <div class="channel-name">Todos los chats</div>
        <nav class="nav-bar">
            <a href="todos.html" class="nav-link active">Todos</a>
            <a href="foxtergg.html" class="nav-link">Foxter</a>
            <a href="elcalvolol.html" class="nav-link">Calvo</a>
            <a href="index.html" class="nav-link">Lopez</a>
            <a href="franbeuve.html" class="nav-link">Fran</a>
        </nav>
    </div>

    <main class="grid-container">
        
        <div class="chat-card">
            <div class="chat-label">FoxTerGG</div>
            <div class="chat-mask" id="box-foxtergg"></div>
        </div>

        <div class="chat-card">
            <div class="chat-label">lopezfnx</div>
            <div class="chat-mask" id="box-lopezfnx"></div>
        </div>

        <div class="chat-card">
            <div class="chat-label">elcalvolol</div>
            <div class="chat-mask" id="box-elcalvolol"></div>
        </div>

        <div class="chat-card">
            <div class="chat-label">franbeuve</div>
            <div class="chat-mask" id="box-franbeuve"></div>
        </div>

    </main>

    <script>
        const targets = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;

            targets.forEach(channel => {
                const mask = document.getElementById(`box-${channel}`);
                if (mask) {
                    mask.innerHTML = `
                        <iframe 
                            src="https://www.twitch.tv/embed/${channel}/chat?parent=${currentDomain}&darkpopout"
                            height="100%"
                            width="100%">
                        </iframe>
                    `;
                }
            });
        });
    </script>
</body>
</html>
