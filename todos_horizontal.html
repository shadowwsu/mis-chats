<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA G4NG // Fila Horizontal</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA PREMIUM CON BOTÓN HOME */
        .streamer-header {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between; /* Título a la izquierda, botón a la derecha */
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffb700; /* Oro premium */
        }

        /* 🏠 BOTÓN HOME DE CRISTAL (LIQUID GLASS) */
        .home-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .home-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Icono SVG de casa minimalista */
        .home-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* 🎛️ CONTENEDOR EN FILA HORIZONTAL PERFECTO */
        .row-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Columnas simétricas */
            grid-template-rows: 1fr;
            gap: 12px;
            flex-grow: 1;
            padding: 12px;
            background: transparent;
        }

        /* Tarjeta de cristal para cada chat */
        .chat-card {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Máscara de recorte superior e inferior */
        .chat-mask {
            width: 100%;
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        /* 🚀 RECORTE AJUSTADO HORIZONTAL: Adiós banner de anuncios y barra morada */
        .chat-mask iframe {
            position: absolute;
            width: 106%;
            left: -3%;
            height: calc(100% + 225px);
            top: -140px; 
            border: none;
            background: transparent;
        }

        /* 🏷️ ETIQUETA INFERIOR (No estorba el texto del chat) */
        .chat-label {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1.5px;
            flex-shrink: 0;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="streamer-header">
        <div class="channel-name">LA G4NG</div>
        
        <a href="index.html" class="home-btn" title="Volver al Menú Central">
            <svg class="home-icon" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </a>
    </div>

    <main class="row-container">
        
        <div class="chat-card">
            <div class="chat-mask" id="box-foxtergg"></div>
            <div class="chat-label">FoxTerGG</div>
        </div>

        <div class="chat-card">
            <div class="chat-mask" id="box-lopezfnx"></div>
            <div class="chat-label">lopezfnx</div>
        </div>

        <div class="chat-card">
            <div class="chat-mask" id="box-elcalvolol"></div>
            <div class="chat-label">elcalvolol</div>
        </div>

        <div class="chat-card">
            <div class="chat-mask" id="box-franbeuve"></div>
            <div class="chat-label">franbeuve</div>
        </div>

    </main>

    <script>
        const targets = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;

            targets.forEach(channel => {
                const mask = document.getElementById(`box-${channel}`);
                if (mask) {
                    mask.innerHTML = `
                        <iframe 
                            src="https://www.twitch.tv/embed/${channel}/chat?parent=${currentDomain}&darkpopout"
                            height="100%"
                            width="100%">
                        </iframe>
                    `;
                }
            });
        });
    </script>
</body>
</html>
