<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA G4NG // Live Stats</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a; /* Fondo ultra oscuro Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* 📊 BARRA MAESTRA DE RESOLUCIÓN AJUSTADA PANORÁMICA */
        .stats-bar {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 16px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Bloque Izquierdo: Marca + Botón Home oculto */
        .stats-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .stats-brand:hover {
            opacity: 0.8;
        }

        /* Logotipo circular premium (Vuelve al Index.html) */
        .brand-logo {
            width: 38px;
            height: 38px;
            background: #121318;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        .stats-brand:hover .brand-logo {
            background: rgba(255, 183, 0, 0.15);
            border-color: #ffb700;
            color: #ffb700;
            transform: scale(1.05);
        }

        .brand-text {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* Bloque Central: Contenedor estirado para las tarjetas de datos */
        .stats-cards-box {
            display: flex;
            gap: 12px;
            flex-grow: 1;
            max-width: 460px;
            margin: 0 24px;
            height: 70%;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* Tarjeta especial de Viewers destacados con aura roja */
        .stat-card.live-viewers {
            border-color: rgba(255, 59, 48, 0.15);
            background: rgba(255, 59, 48, 0.02);
            box-shadow: inset 0 0 15px rgba(255, 59, 48, 0.05);
        }

        .stat-card.live-viewers .number {
            color: #ff3b30; /* Rojo neon directo */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Punto dinámico simulando directo */
        .stat-card.live-viewers .number::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3b30;
        }

        .stat-card.live-viewers .label {
            color: rgba(255, 59, 48, 0.6);
        }

        /* Bloque Derecho: Controles e Interruptor de Minecraft */
        .stats-controls {
            display: flex;
            align-items: center;
        }

        /* Botón interruptor estilo widget */
        .mc-toggle-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mc-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .mc-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 59, 48, 0.8); /* Rojo apagado al inicio */
            transition: color 0.2s ease;
        }

        /* El interruptor físico */
        .mc-switch {
            width: 26px;
            height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            transition: background 0.2s ease;
        }

        .mc-switch::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Estado ACTIVO (ON) provocado por el clic */
        .mc-toggle-btn.active .mc-label {
            color: #34c759; /* Verde encendido */
        }
        .mc-toggle-btn.active .mc-switch {
            background: #34c759;
        }
        .mc-toggle-btn.active .mc-switch::after {
            transform: translateX(12px);
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        
        <a href="index.html" class="stats-brand" title="Volver al Panel Central">
            <div class="brand-logo">LG</div>
            <div class="brand-text">LA<br>G4NG</div>
        </a>

        <div class="stats-cards-box">
            <div class="stat-card">
                <span class="number">3</span>
                <span class="label">Canales Online</span>
            </div>
            
            <div class="stat-card live-viewers">
                <span class="number">1272</span>
                <span class="label">Viewers en Directo</span>
            </div>
        </div>

        <div class="stats-controls">
            <div class="mc-toggle-btn" id="mcToggle">
                <span class="mc-label" id="mcLabel">Minecraft Off</span>
                <div class="mc-switch"></div>
            </div>
        </div>
        
    </div>

    <script>
        const mcToggle = document.getElementById('mcToggle');
        const mcLabel = document.getElementById('mcLabel');

        mcToggle.addEventListener('click', () => {
            mcToggle.classList.toggle('active');
            if(mcToggle.classList.contains('active')) {
                mcLabel.textContent = 'Minecraft On';
            } else {
                mcLabel.textContent = 'Minecraft Off';
            }
        });
    </script>

</body>
</html>
