<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA G4NG // Live Stats REAL</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a; /* Fondo ultra oscuro Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* 📊 BARRA MAESTRA DE RESOLUCIÓN AJUSTADA PANORÁMICA */
        .stats-bar {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 16px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Bloque Izquierdo: Marca + Retorno al index */
        .stats-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: opacity 0.2s ease;
            flex-shrink: 0;
        }

        .stats-brand:hover {
            opacity: 0.8;
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            background: #121318;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        .stats-brand:hover .brand-logo {
            background: rgba(255, 183, 0, 0.15);
            border-color: #ffb700;
            color: #ffb700;
            transform: scale(1.05);
        }

        .brand-text {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* 🎯 CONTENEDOR CENTRALIZADO FUSIONADO */
        .center-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 6px;
            margin: 0 24px;
            height: 100%;
        }

        /* Bloque de tarjetas de datos estirado */
        .stats-cards-box {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 460px;
            height: 65%;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* Tarjeta de Viewers con aura roja premium */
        .stat-card.live-viewers {
            border-color: rgba(255, 59, 48, 0.15);
            background: rgba(255, 59, 48, 0.02);
            box-shadow: inset 0 0 15px rgba(255, 59, 48, 0.05);
        }

        .stat-card.live-viewers .number {
            color: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-shadow: 0 0 15px rgba(255, 59, 48, 0.2);
        }

        /* Punto animado real de directo */
        .stat-card.live-viewers .number::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3b30;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px #ff3b30; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .stat-card.live-viewers .label {
            color: rgba(255, 59, 48, 0.6);
        }

        /* Sub-barra inferior con streamers reales encendidos */
        .live-streamers-list {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 20px;
        }

        .streamer-tag {
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-dot {
            width: 4px;
            height: 4px;
            background: #ff3b30;
            border-radius: 50%;
            box-shadow: 0 0 6px #ff3b30;
        }

        .tag-sep {
            color: rgba(255, 255, 255, 0.12);
            font-size: 9px;
        }

        .no-live {
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Bloque Derecho: Botón de Regresar Limpio */
        .right-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .right-indicator:hover {
            color: #000;
            background: #ffb700;
            border-color: #ffb700;
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(255, 183, 0, 0.4);
        }

        .person-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        @media (max-height: 180px) {
            .stats-cards-box { height: 80%; }
            .live-streamers-list { display: none; }
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        
        <a href="index.html" class="stats-brand" title="Volver al Panel Central">
            <div class="brand-logo">LG</div>
            <div class="brand-text">LA<br>G4NG</div>
        </a>

        <div class="center-display">
            <div class="stats-cards-box">
                <div class="stat-card">
                    <span class="number" id="channelsReal">-</span>
                    <span class="label">Canales Online</span>
                </div>
                
                <div class="stat-card live-viewers">
                    <span class="number" id="viewersReal">-</span>
                    <span class="label">Viewers en Directo</span>
                </div>
            </div>

            <div class="live-streamers-list" id="streamersContainer">
                <span class="no-live">Comprobando Twitch API...</span>
            </div>
        </div>

        <a href="index.html" class="right-indicator" title="Volver al Panel Central">
            <svg class="person-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </a>
        
    </div>

    <script>
        const TWITCH_CLIENT_ID = 'pri5etevynchqv1cb3f1h5iutrf050'; 
        const streamers = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        const channelsEl = document.getElementById('channelsReal');
        const viewersEl = document.getElementById('viewersReal');
        const containerEl = document.getElementById('streamersContainer');

        // Función para animar los números suavemente al subir o bajar
        function animateNumberUpdate(element, start, end, duration) {
            if (isNaN(start)) start = 0;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                element.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        async function updateTwitchStatsRealtime() {
            try {
                // Peticiones paralelas rápidas e individuales por canal para recolectar espectadores reales
                const promises = streamers.map(async (name) => {
                    const res = await fetch(`https://decapi.me/twitch/viewercount/${name}`);
                    const text = await res.text();
                    
                    if (!text.includes("offline") && !text.includes("not found")) {
                        const count = parseInt(text.replace(/,/g, '')) || 0;
                        return { name, viewers: count, isLive: true };
                    }
                    return { name, viewers: 0, isLive: false };
                });

                const results = await Promise.all(promises);
                const liveChannels = results.filter(r => r.isLive);

                let targetViewers = 0;
                let targetChannels = liveChannels.length;

                // Capturar valores actuales en pantalla para la transición
                let currentChannels = parseInt(channelsEl.innerHTML) || 0;
                let currentViewers = parseInt(viewersEl.innerHTML) || 0;

                // Animar contadores principales
                animateNumberUpdate(channelsEl, currentChannels, targetChannels, 800);

                if (targetChannels === 0) {
                    animateNumberUpdate(viewersEl, currentViewers, 0, 800);
                    containerEl.innerHTML = '<span class="no-live">Todos los canales están Offline 💤</span>';
                } else {
                    containerEl.innerHTML = '';
                    
                    liveChannels.forEach((stream, index) => {
                        targetViewers += stream.viewers;
                        
                        // Crear tag del streamer en directo
                        const tag = document.createElement('div');
                        tag.className = 'streamer-tag';
                        tag.innerHTML = `<span class="tag-dot"></span> ${stream.name}`;
                        containerEl.appendChild(tag);

                        // Separador intermedio
                        if (index < targetChannels - 1) {
                            const sep = document.createElement('span');
                            sep.className = 'tag-sep';
                            sep.innerText = '|';
                            containerEl.appendChild(sep);
                        }
                    });

                    // Animar la subida o bajada suave de los viewers acumulados
                    animateNumberUpdate(viewersEl, currentViewers, targetViewers, 1200);
                }

            } catch (error) {
                console.error("Error en Twitch API:", error);
                channelsEl.innerHTML = "0";
                viewersEl.innerHTML = "0";
                containerEl.innerHTML = '<span class="no-live">Todos los canales están Offline 💤</span>';
            }
        }

        // Ejecución inicial y bucle automatizado cada 30 segundos
        window.addEventListener('DOMContentLoaded', () => {
            updateTwitchStatsRealtime();
            setInterval(updateTwitchStatsRealtime, 30000);
        });
    </script>

</body>
</html>
