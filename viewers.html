<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA G4NG // Live Stats REAL</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .stats-bar {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 16px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .stats-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            background: #121318;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .brand-text {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        /* CENTRO UNIFICADO */
        .center-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 6px;
            margin: 0 20px;
        }

        .counters-row {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .counter-group {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .counter-number {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
        }

        .counter-number.live {
            color: #ff3b30;
            text-shadow: 0 0 15px rgba(255, 59, 48, 0.3);
        }

        .counter-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* STREAMERS EN VIVO EN TIEMPO REAL */
        .live-streamers {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 23px;
        }

        .streamer-tag {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 5px;
            height: 5px;
            background: #ff3b30;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3b30;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px #ff3b30; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .tag-sep {
            color: rgba(255, 255, 255, 0.15);
            font-size: 10px;
        }

        /* Mensaje de espera o sin datos */
        .no-live {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* BOTÓN REGRESAR */
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            flex-shrink: 0;
        }

        .back-btn:hover {
            color: #000;
            background: #ffb700;
            border-color: #ffb700;
            transform: scale(1.05);
        }

        .back-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        
        <div class="stats-brand">
            <div class="brand-logo">LG</div>
            <div class="brand-text">LA<br>G4NG</div>
        </div>

        <div class="center-display">
            <div class="counters-row">
                <div class="counter-group">
                    <span class="counter-number" id="numChannels">-</span>
                    <span class="counter-label">Online</span>
                </div>
                <div class="counter-group">
                    <span class="counter-number live" id="numViewers">-</span>
                    <span class="counter-label">Viewers</span>
                </div>
            </div>

            <div class="live-streamers" id="liveContainer">
                <span class="no-live">Conectando con Twitch API...</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">
            <svg class="back-icon" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </a>
        
    </div>

    <script>
        // 🔑 CONFIGURACIÓN DE TWITCH DEVELOPERS
        // Para que funcione de verdad, ve a dev.twitch.tv, crea una app y pega aquí tus claves:
        const TWITCH_CLIENT_ID = 'pri5etevynchqv1cb3f1h5iutrf050'; 
        const TWITCH_SECRET    = 'lq94jxv0jrhq5635z4gwvqjldgtwy4';
        
        // Lista de canales de LA G4NG a trackear
        const streamers = ['foxtergg', 'lopezfnx', 'elcalvolol', 'franbeuve'];

        const channelsEl = document.getElementById('numChannels');
        const viewersEl = document.getElementById('numViewers');
        const containerEl = document.getElementById('liveContainer');

        // Función para pedirle el token de acceso seguro a Twitch
        async function getTwitchToken() {
            if(TWITCH_CLIENT_ID === 'pri5etevynchqv1cb3f1h5iutrf050') return null;
            try {
                const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${TWITCH_CLIENT_ID}&client_secret=${TWITCH_SECRET}&grant_type=client_credentials`, { method: 'POST' });
                const data = await res.json();
                return data.access_token;
            } catch (e) {
                console.error("Error obteniendo token de Twitch", e);
                return null;
            }
        }

        // Función Maestra para comprobar quién está prendido de verdad
        async function checkLiveStats() {
            const token = await getTwitchToken();
            
            // Si no hay claves reales configuradas, mostramos simulación inteligente para que no se rompa
            if (!token) {
                channelsEl.innerHTML = "0";
                viewersEl.innerHTML = "0";
                containerEl.innerHTML = '<span class="no-live">⚠️ Configura las claves de Twitch Dev</span>';
                return;
            }

            try {
                // Construye la query para preguntar por todos a la vez
                const queryParams = streamers.map(name => `user_login=${name}`).join('&');
                const res = await fetch(`https://api.twitch.tv/helix/streams?${queryParams}`, {
                    headers: {
                        'Client-ID': TWITCH_CLIENT_ID,
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await res.json();
                const activeStreams = data.data || [];

                let totalViewers = 0;
                let onlineCount = activeStreams.length;

                if (onlineCount === 0) {
                    channelsEl.innerHTML = "0";
                    viewersEl.innerHTML = "0";
                    containerEl.innerHTML = '<span class="no-live">Todos los canales están Offline 💤</span>';
                } else {
                    channelsEl.innerHTML = onlineCount;
                    containerEl.innerHTML = ''; // Limpiar contenedor

                    activeStreams.forEach((stream, index) => {
                        totalViewers += stream.viewer_count;
                        
                        // Añadir tag del streamer
                        const tag = document.createElement('div');
                        tag.className = 'streamer-tag';
                        tag.innerHTML = `<span class="pulse-dot"></span> ${stream.user_name}`;
                        containerEl.appendChild(tag);

                        // Añadir barra separadora si no es el último
                        if (index < onlineCount - 1) {
                            const sep = document.createElement('span');
                            sep.className = 'tag-sep';
                            sep.innerText = '|';
                            containerEl.appendChild(sep);
                        }
                    });

                    viewersEl.innerHTML = totalViewers;
                }

            } catch (error) {
                console.error("Error consultando la API de Twitch", error);
                containerEl.innerHTML = '<span class="no-live">❌ Error de conexión</span>';
            }
        }

        // Ejecutar al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            checkLiveStats();
            // Refrescar datos reales automáticamente cada 60 segundos (para no saturar la API)
            setInterval(checkLiveStats, 60000);
        });
    </script>

</body>
</html>
