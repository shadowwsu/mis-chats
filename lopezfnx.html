<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lopezfnx // Chat Individual</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #06070a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA PREMIUM CON BOTÓN HOME */
        .streamer-header {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffb700; /* Oro premium */
        }

        /* 🏠 BOTÓN HOME DE CRISTAL (LIQUID GLASS) */
        .home-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .home-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .home-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* 🗃️ CONTENEDOR MÁSCARA (CORTA TODO EL RELLENO DE TWITCH) */
        .chat-mask {
            width: 100%;
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        /* 🚀 RECORTE AJUSTADO INDIVIDUAL PREMIUM */
        .chat-mask iframe {
            position: absolute;
            width: 106%;
            left: -3%;
            height: calc(100% + 250px);
            top: -165px; /* Sube el chat para esconder la barra morada */
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="streamer-header">
        <div class="channel-name">Lopezfnx</div>
        
        <a href="index.html" class="home-btn" title="Volver al Menú Central">
            <svg class="home-icon" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </a>
    </div>

    <div class="chat-mask" id="chatContainer"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;
            const container = document.getElementById('chatContainer');
            
            // Carga el chat de lopezfnx
            container.innerHTML = `
                <iframe 
                    src="https://www.twitch.tv/embed/lopezfnx/chat?parent=${currentDomain}&darkpopout"
                    height="100%"
                    width="100%">
                </iframe>
            `;
        });
    </script>
</body>
</html>
