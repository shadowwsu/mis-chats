<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxTerGG // Chat Vertical</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow: hidden;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #090a0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
        }

        /* 🏷️ CABECERA PREMIUM ESTILO APPLE */
        .streamer-header {
            width: 100%;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffb700; /* Dorado premium */
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        /* 🗃️ CONTENEDOR MÁSCARA (CORTA TODO EL RELLENO DE TWITCH) */
        .chat-mask {
            width: 100%;
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        /* 🚀 EL TRUCO DEL RECORTE TOTAL */
        .chat-mask iframe {
            position: absolute;
            width: 106%;
            left: -3%;
            height: calc(100% + 195px);
            top: -115px; /* Sube el chat para saltarse anuncios, bits y la X */
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="streamer-header">FoxTerGG</div>

    <div class="chat-mask" id="chatContainer"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentDomain = window.location.hostname;
            const container = document.getElementById('chatContainer');
            
            // Carga directamente el chat incrustado de FoxTerGG
            container.innerHTML = `
                <iframe 
                    src="https://www.twitch.tv/embed/FoxTerGG/chat?parent=${currentDomain}&darkpopout"
                    height="100%"
                    width="100%">
                </iframe>
            `;
        });
    </script>
</body>
</html>
